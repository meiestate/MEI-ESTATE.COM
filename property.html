<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MEI Estate — Property Details</title>
  <meta name="description" content="View full approved property details on MEI Estate." />
  <style>
    :root{
      --bg:#07111f;
      --bg2:#0b1830;
      --panel:#0d1a31;
      --panel2:#122342;
      --soft:rgba(255,255,255,.05);
      --soft2:rgba(255,255,255,.08);
      --line:rgba(255,255,255,.12);
      --text:#ebf2ff;
      --muted:#9fb1d1;
      --accent:#8cb8ff;
      --accent2:#6ee6ff;
      --ok:#35d07f;
      --warn:#ffc857;
      --shadow:0 18px 60px rgba(0,0,0,.35);
      --radius:22px;
      --radius-sm:14px;
      --max:1200px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(circle at top left, rgba(110,230,255,.08), transparent 26%),
        radial-gradient(circle at top right, rgba(140,184,255,.10), transparent 22%),
        linear-gradient(180deg, #04101d 0%, #07111f 30%, #061326 100%);
      color:var(--text);
      min-height:100vh;
    }

    a{color:inherit;text-decoration:none}
    img{max-width:100%;display:block}

    .shell{
      width:min(var(--max), calc(100% - 28px));
      margin:0 auto;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:20;
      backdrop-filter:blur(12px);
      background:rgba(4,11,23,.72);
      border-bottom:1px solid var(--line);
    }

    .topbarInner{
      width:min(var(--max), calc(100% - 28px));
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:18px 0;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .brandLogo{
      width:48px;
      height:48px;
      border-radius:16px;
      background:linear-gradient(135deg, #8cb8ff, #6ee6ff);
      color:#051120;
      font-weight:900;
      display:grid;
      place-items:center;
      box-shadow:0 10px 24px rgba(110,230,255,.18);
      flex:0 0 auto;
    }

    .brandText{
      min-width:0;
    }

    .brandText h1{
      margin:0;
      font-size:1.45rem;
      line-height:1.05;
      letter-spacing:.2px;
    }

    .brandText p{
      margin:4px 0 0;
      color:var(--muted);
      font-size:.95rem;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .nav{
      display:flex;
      flex-wrap:wrap;
      justify-content:flex-end;
      gap:10px;
    }

    .nav a{
      padding:12px 16px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
      border-radius:16px;
      color:var(--text);
      font-weight:700;
      transition:.18s ease;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    }

    .nav a:hover{
      transform:translateY(-1px);
      border-color:rgba(140,184,255,.35);
      background:linear-gradient(180deg, rgba(140,184,255,.12), rgba(255,255,255,.04));
    }

    main{
      padding:24px 0 40px;
    }

    .infoBar{
      display:none;
      margin:0 0 18px;
      padding:14px 16px;
      border-radius:16px;
      border:1px solid rgba(255,200,87,.28);
      background:linear-gradient(180deg, rgba(255,200,87,.12), rgba(255,200,87,.05));
      color:#ffe5a3;
      font-weight:600;
    }

    .heroCard{
      border:1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(255,255,255,.03), rgba(255,255,255,.015)),
        linear-gradient(180deg, rgba(140,184,255,.04), rgba(110,230,255,.02));
      border-radius:30px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .heroGrid{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:0;
    }

    .mediaPane{
      min-height:440px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        linear-gradient(135deg, #0c1930, #0a1427);
      position:relative;
      display:flex;
      align-items:stretch;
      justify-content:stretch;
    }

    .mediaPane img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .noImage{
      width:100%;
      min-height:440px;
      display:grid;
      place-items:center;
      color:#b3c4e8;
      font-weight:800;
      font-size:1.2rem;
      letter-spacing:.4px;
      background:
        radial-gradient(circle at 30% 20%, rgba(140,184,255,.15), transparent 24%),
        radial-gradient(circle at 70% 60%, rgba(110,230,255,.12), transparent 24%),
        linear-gradient(135deg, #0d1c34, #091325);
    }

    .detailPane{
      padding:28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.01)),
        linear-gradient(135deg, rgba(140,184,255,.05), rgba(110,230,255,.02));
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .badgeRow{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:16px;
    }

    .badge{
      padding:8px 12px;
      border-radius:999px;
      font-size:.86rem;
      font-weight:800;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
    }

    .badge.ok{
      color:#b7ffd5;
      border-color:rgba(53,208,127,.35);
      background:rgba(53,208,127,.12);
    }

    .badge.featured{
      color:#ffe9a3;
      border-color:rgba(255,200,87,.35);
      background:rgba(255,200,87,.13);
    }

    .badge.soft{
      color:#d9e8ff;
      border-color:rgba(140,184,255,.26);
      background:rgba(140,184,255,.10);
    }

    .propTitle{
      margin:0 0 10px;
      font-size:clamp(2rem, 4vw, 3rem);
      line-height:1.03;
      letter-spacing:.2px;
    }

    .propPrice{
      font-size:1.8rem;
      font-weight:900;
      margin:0 0 8px;
      color:#f5fbff;
    }

    .propLocation{
      color:var(--muted);
      font-size:1.02rem;
      margin-bottom:18px;
    }

    .chipGrid{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin:0 0 20px;
    }

    .chip{
      padding:10px 14px;
      border-radius:14px;
      background:var(--soft);
      border:1px solid var(--line);
      color:#dce8ff;
      font-weight:700;
      font-size:.95rem;
    }

    .desc{
      margin:0;
      padding:16px 18px;
      border:1px solid var(--line);
      border-radius:18px;
      background:rgba(255,255,255,.035);
      color:#d5e2fb;
      line-height:1.7;
    }

    .contactCard{
      margin-top:18px;
      border:1px solid var(--line);
      border-radius:18px;
      background:rgba(255,255,255,.035);
      padding:18px;
    }

    .contactCard h3{
      margin:0 0 12px;
      font-size:1.02rem;
    }

    .contactList{
      display:grid;
      gap:10px;
    }

    .contactItem{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      color:#d8e5ff;
    }

    .contactItem b{
      color:#fff;
    }

    .actionRow{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:22px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:46px;
      padding:12px 18px;
      border-radius:16px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.03));
      color:var(--text);
      font-weight:800;
      letter-spacing:.15px;
      transition:.18s ease;
      cursor:pointer;
    }

    .btn:hover{
      transform:translateY(-1px);
      border-color:rgba(140,184,255,.35);
    }

    .btn.primary{
      color:#04111e;
      border-color:transparent;
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow:0 12px 28px rgba(110,230,255,.18);
    }

    .btn.small{
      min-height:40px;
      padding:10px 14px;
      border-radius:14px;
      font-size:.92rem;
    }

    .section{
      margin-top:22px;
    }

    .sectionCard{
      border:1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.01)),
        linear-gradient(135deg, rgba(140,184,255,.04), rgba(110,230,255,.015));
      border-radius:24px;
      padding:22px;
      box-shadow:var(--shadow);
    }

    .sectionTitle{
      margin:0 0 16px;
      font-size:1.35rem;
      letter-spacing:.2px;
    }

    .metaGrid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:14px;
    }

    .metaItem{
      border:1px solid var(--line);
      background:var(--soft);
      border-radius:18px;
      padding:16px;
    }

    .metaLabel{
      color:var(--muted);
      font-size:.88rem;
      margin-bottom:8px;
    }

    .metaValue{
      font-size:1rem;
      font-weight:800;
      color:#f4f8ff;
      word-break:break-word;
    }

    .relatedGrid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:16px;
    }

    .relatedCard{
      border:1px solid var(--line);
      border-radius:20px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015)),
        linear-gradient(135deg, rgba(140,184,255,.04), rgba(110,230,255,.02));
      overflow:hidden;
      min-height:100%;
    }

    .relatedThumb{
      height:180px;
      background:
        radial-gradient(circle at top left, rgba(140,184,255,.14), transparent 28%),
        radial-gradient(circle at bottom right, rgba(110,230,255,.12), transparent 24%),
        linear-gradient(135deg, #0e1a31, #091225);
      display:flex;
      align-items:center;
      justify-content:center;
      color:#bdd0f6;
      font-weight:800;
    }

    .relatedThumb img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .relatedBody{
      padding:16px;
    }

    .relatedTitle{
      margin:0 0 8px;
      font-size:1.08rem;
      font-weight:900;
      line-height:1.25;
    }

    .relatedPrice{
      font-size:1rem;
      font-weight:900;
      margin-bottom:8px;
    }

    .relatedMeta{
      color:var(--muted);
      line-height:1.55;
      margin-bottom:14px;
      font-size:.95rem;
    }

    .emptyState{
      border:1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.01)),
        linear-gradient(135deg, rgba(140,184,255,.04), rgba(110,230,255,.02));
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:48px 24px;
      text-align:center;
    }

    .emptyState h2{
      margin:0 0 10px;
      font-size:2rem;
    }

    .emptyState p{
      margin:0 0 18px;
      color:var(--muted);
      font-size:1rem;
    }

    footer{
      padding:26px 0 38px;
    }

    .footerInner{
      width:min(var(--max), calc(100% - 28px));
      margin:0 auto;
      border-top:1px solid var(--line);
      padding-top:18px;
      color:var(--muted);
      display:flex;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
    }

    .footerLinks{
      display:flex;
      flex-wrap:wrap;
      gap:16px;
    }

    @media (max-width: 980px){
      .heroGrid{
        grid-template-columns:1fr;
      }

      .mediaPane,
      .noImage{
        min-height:320px;
      }

      .relatedGrid{
        grid-template-columns:1fr 1fr;
      }
    }

    @media (max-width: 720px){
      .topbarInner{
        flex-direction:column;
        align-items:stretch;
      }

      .nav{
        justify-content:flex-start;
      }

      .detailPane{
        padding:20px;
      }

      .metaGrid{
        grid-template-columns:1fr;
      }

      .relatedGrid{
        grid-template-columns:1fr;
      }

      .propTitle{
        font-size:2rem;
      }

      .propPrice{
        font-size:1.45rem;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbarInner">
      <div class="brand">
        <div class="brandLogo">MEI</div>
        <div class="brandText">
          <h1>MEI Estate</h1>
          <p>Property • Approved Listing • Cloud CRM Enquiry</p>
        </div>
      </div>

      <nav class="nav">
        <a href="index.html">🏠 Home</a>
        <a href="listings.html">⬅ Back to Listings</a>
        <a href="seller.html">📢 Sell Property</a>
        <a href="dashboard.html">🛡 Dashboard</a>
      </nav>
    </div>
  </header>

  <main class="shell">
    <div id="pageInfo" class="infoBar"></div>
    <div id="propertyRoot"></div>
  </main>

  <footer>
    <div class="footerInner">
      <div>© <span id="yr"></span> MEI Estate</div>
      <div class="footerLinks">
        <a href="index.html">Home</a>
        <a href="listings.html">Listings</a>
        <a href="seller.html">Sell Property</a>
        <a href="dashboard.html">Dashboard</a>
      </div>
    </div>
  </footer>

  <script>
    (() => {
      "use strict";

      const STORAGE_KEY = "mei_properties_v1";
      const $ = (id) => document.getElementById(id);

      document.addEventListener("DOMContentLoaded", init);

      function init() {
        const yr = $("yr");
        if (yr) yr.textContent = new Date().getFullYear();

        const all = readJSON(STORAGE_KEY, []).map(normalizeProperty);
        const approved = all.filter(item => item.status === "approved");

        if (!approved.length) {
          renderEmpty(
            "No approved property found",
            "Dashboard-ல் approved property save செய்த பிறகு இந்த page automatic-ஆ வேலை செய்யும்."
          );
          return;
        }

        const url = new URL(window.location.href);
        const id = String(url.searchParams.get("id") || "").trim();

        let selected = null;

        if (id) {
          selected = approved.find(item => String(item.id) === id);
        }

        if (!selected) {
          selected = getLatestProperty(approved);

          if (!id) {
            replaceUrlId(selected.id);
            showInfo("Property ID இல்லாததால் latest approved property load செய்யப்பட்டது.");
          } else {
            showInfo("Requested property கிடைக்கவில்லை. Latest approved property காட்டப்படுகிறது.");
          }
        }

        renderProperty(selected, approved);
      }

      function readJSON(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          if (!raw) return fallback;
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : fallback;
        } catch (err) {
          console.error("readJSON error:", err);
          return fallback;
        }
      }

      function cleanNumber(value) {
        if (typeof value === "number") return Number.isFinite(value) ? value : 0;
        const onlyDigits = String(value || "").replace(/[^\d]/g, "");
        return onlyDigits ? Number(onlyDigits) : 0;
      }

      function formatINR(value) {
        const num = cleanNumber(value);
        return num ? "₹" + num.toLocaleString("en-IN") : "Price on request";
      }

      function normalizeType(type) {
        const t = String(type || "").trim().toLowerCase();
        if (!t) return "";
        const map = {
          apartment: "Apartment",
          house: "House",
          plot: "Plot",
          commercial: "Commercial",
          villa: "Villa",
          office: "Office",
          warehouse: "Warehouse",
          shop: "Shop",
          pg: "PG"
        };
        return map[t] || String(type || "").trim();
      }

      function normalizeProperty(p) {
        return {
          id: String(p.id || "").trim(),
          title: String(p.title || p.name || "Untitled Listing").trim(),
          city: String(p.city || "").trim(),
          area: String(p.area || p.locality || "").trim(),
          type: normalizeType(p.type),
          bhk: String(p.bhk || "").trim(),
          price: cleanNumber(p.price),
          sqft: cleanNumber(p.sqft || p.areaSqft || p.area_size),
          description: String(p.description || p.desc || p.note || "").trim(),
          image: String(p.image || p.imageUrl || "").trim(),
          status: String(p.status || "").trim().toLowerCase(),
          createdAt: p.createdAt || p.created_at || "",
          featured: Boolean(p.featured),
          brokerName: String(p.brokerName || p.broker_name || "").trim(),
          sellerName: String(p.sellerName || p.seller_name || "").trim(),
          facing: String(p.facing || "").trim(),
          furnishing: String(p.furnishing || "").trim(),
          purpose: String(p.purpose || "").trim(),
          mobile: String(p.mobile || p.phone || "").trim()
        };
      }

      function getLatestProperty(items) {
        return [...items].sort((a, b) => {
          return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
        })[0];
      }

      function replaceUrlId(id) {
        if (!id) return;
        const url = new URL(window.location.href);
        url.searchParams.set("id", id);
        window.history.replaceState({}, "", url.toString());
      }

      function showInfo(message) {
        const bar = $("pageInfo");
        if (!bar) return;
        bar.textContent = message;
        bar.style.display = "block";
      }

      function renderEmpty(title, text) {
        const root = $("propertyRoot");
        if (!root) return;

        root.innerHTML = `
          <section class="emptyState">
            <h2>${escapeHtml(title)}</h2>
            <p>${escapeHtml(text)}</p>
            <a class="btn primary" href="listings.html">Go to Listings</a>
          </section>
        `;
      }

      function renderProperty(item, approvedList) {
        const root = $("propertyRoot");
        if (!root) return;

        const related = approvedList
          .filter(p => p.id !== item.id)
          .sort((a, b) => Number(b.featured) - Number(a.featured))
          .slice(0, 3);

        root.innerHTML = `
          <section class="heroCard">
            <div class="heroGrid">
              <div class="mediaPane">
                ${
                  item.image
                    ? `<img src="${escapeAttr(item.image)}" alt="${escapeAttr(item.title)}" onerror="this.parentNode.innerHTML='<div class=\\'noImage\\'>No Image</div>';">`
                    : `<div class="noImage">No Image</div>`
                }
              </div>

              <div class="detailPane">
                <div class="badgeRow">
                  <span class="badge ok">Approved</span>
                  ${item.featured ? `<span class="badge featured">Featured</span>` : ""}
                  ${item.type ? `<span class="badge soft">${escapeHtml(item.type)}</span>` : ""}
                </div>

                <h2 class="propTitle">${escapeHtml(item.title)}</h2>
                <div class="propPrice">${formatINR(item.price)}</div>
                <div class="propLocation">
                  ${escapeHtml([item.area, item.city].filter(Boolean).join(", ") || "Location not specified")}
                </div>

                <div class="chipGrid">
                  ${item.bhk ? `<span class="chip">${escapeHtml(item.bhk)}</span>` : ""}
                  ${item.sqft ? `<span class="chip">${item.sqft} sqft</span>` : ""}
                  ${item.facing ? `<span class="chip">${escapeHtml(item.facing)} Facing</span>` : ""}
                  ${item.furnishing ? `<span class="chip">${escapeHtml(item.furnishing)}</span>` : ""}
                  ${item.purpose ? `<span class="chip">${escapeHtml(item.purpose)}</span>` : ""}
                </div>

                <p class="desc">
                  ${escapeHtml(item.description || "No detailed description added yet.")}
                </p>

                <div class="contactCard">
                  <h3>Contact Details</h3>
                  <div class="contactList">
                    ${item.brokerName ? `<div class="contactItem"><b>Broker:</b> <span>${escapeHtml(item.brokerName)}</span></div>` : ""}
                    ${item.sellerName ? `<div class="contactItem"><b>Seller:</b> <span>${escapeHtml(item.sellerName)}</span></div>` : ""}
                    ${item.mobile ? `<div class="contactItem"><b>Contact:</b> <span>${escapeHtml(item.mobile)}</span></div>` : ""}
                    ${!item.brokerName && !item.sellerName && !item.mobile ? `<div class="contactItem"><span>Contact details not added yet.</span></div>` : ""}
                  </div>
                </div>

                <div class="actionRow">
                  <a class="btn" href="listings.html">← Back to Listings</a>
                  <a class="btn primary" href="seller.html">Enquire Now</a>
                </div>
              </div>
            </div>
          </section>

          <section class="section">
            <div class="sectionCard">
              <h3 class="sectionTitle">Property Overview</h3>
              <div class="metaGrid">
                ${metaItem("Property ID", item.id || "Not available")}
                ${metaItem("Type", item.type || "Not specified")}
                ${metaItem("Price", formatINR(item.price))}
                ${metaItem("Area", item.sqft ? item.sqft + " sqft" : "Not specified")}
                ${metaItem("BHK", item.bhk || "Not specified")}
                ${metaItem("Purpose", item.purpose || "Not specified")}
                ${metaItem("Facing", item.facing || "Not specified")}
                ${metaItem("Furnishing", item.furnishing || "Not specified")}
                ${metaItem("City", item.city || "Not specified")}
                ${metaItem("Locality", item.area || "Not specified")}
              </div>
            </div>
          </section>

          ${
            related.length ? `
            <section class="section">
              <div class="sectionCard">
                <h3 class="sectionTitle">Related Properties</h3>
                <div class="relatedGrid">
                  ${related.map(renderRelatedCard).join("")}
                </div>
              </div>
            </section>` : ""
          }
        `;
      }

      function metaItem(label, value) {
        return `
          <div class="metaItem">
            <div class="metaLabel">${escapeHtml(label)}</div>
            <div class="metaValue">${escapeHtml(value)}</div>
          </div>
        `;
      }

      function renderRelatedCard(item) {
        return `
          <article class="relatedCard">
            <div class="relatedThumb">
              ${
                item.image
                  ? `<img src="${escapeAttr(item.image)}" alt="${escapeAttr(item.title)}" onerror="this.parentNode.innerHTML='No Image';">`
                  : `No Image`
              }
            </div>
            <div class="relatedBody">
              <div class="relatedTitle">${escapeHtml(item.title)}</div>
              <div class="relatedPrice">${formatINR(item.price)}</div>
              <div class="relatedMeta">
                ${escapeHtml([item.area, item.city].filter(Boolean).join(", ") || "Location not specified")}
                ${item.sqft ? ` • ${item.sqft} sqft` : ""}
              </div>
              <a class="btn small primary" href="property.html?id=${encodeURIComponent(item.id)}">View Property</a>
            </div>
          </article>
        `;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function escapeAttr(value) {
        return escapeHtml(value);
      }
    })();
  </script>
</body>
</html>
