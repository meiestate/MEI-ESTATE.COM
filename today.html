<!doctype html>
<html lang="ta">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MEI — Today Follow-ups</title>

<style>
:root{
  --bg:#0b1220;
  --card:#121b2f;
  --line:rgba(255,255,255,.10);
  --txt:#e8eefc;
  --pill:rgba(255,255,255,.08);
}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,Arial;background:var(--bg);color:var(--txt)}
.wrap{max-width:1150px;margin:0 auto;padding:20px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px}
.top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.h1{font-size:24px;font-weight:900}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
a.link{color:var(--txt);text-decoration:none;padding:8px 12px;border:1px solid var(--line);border-radius:10px}
button{padding:8px 10px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--txt);cursor:pointer}
button:hover{background:rgba(255,255,255,.1)}
.ok{border-color:rgba(0,255,150,.3);background:rgba(0,255,150,.12)}
.warn{border-color:rgba(255,200,0,.3);background:rgba(255,200,0,.12)}
.danger{border-color:rgba(255,0,90,.3);background:rgba(255,0,90,.12)}
.pill{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px;background:var(--pill);border:1px solid var(--line)}
input,select,textarea{padding:8px;border-radius:8px;border:1px solid var(--line);background:#0b1220;color:var(--txt)}
table{width:100%;border-collapse:collapse;margin-top:12px}
th,td{padding:10px;border-top:1px solid rgba(255,255,255,.08);vertical-align:top}
.overdueRow{background:rgba(255,0,90,.08)}
.toast{display:none;margin-top:10px;padding:8px;border-radius:10px;border:1px solid rgba(0,255,150,.3);background:rgba(0,255,150,.15)}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
<div class="top">
<div>
<div class="h1">Today Follow-ups</div>
<div style="opacity:.7;font-size:13px">Today + Overdue execution view</div>
</div>
<div class="row">
<a class="link" href="dashboard.html">Dashboard</a>
<button onclick="refresh()">Refresh</button>
</div>
</div>

<div class="row" style="margin-top:10px">
<input id="search" placeholder="Search buyer / listing / phone / notes..." oninput="refresh()">
<button class="ok" onclick="markAllDone()">Mark All Done</button>
</div>

<div class="row" style="margin-top:10px">
<span class="pill">Total: <b id="count">0</b></span>
<span class="pill">Overdue: <b id="overdueCount">0</b></span>
</div>

<div id="toast" class="toast">Updated</div>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Follow-up</th>
<th>Listing</th>
<th>Buyer</th>
<th>Phone</th>
<th>Status</th>
<th>Notes</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>
</div>

</div>

<script>
const LEADS_KEY="mei_leads_v1";
const WA_TEMPLATE_KEY="mei_whatsapp_template_v1";

const $=id=>document.getElementById(id);

function toast(msg){
  const el=$("toast");
  el.textContent=msg;
  el.style.display="block";
  setTimeout(()=>el.style.display="none",1200);
}

function todayYMD(){
  const d=new Date();
  return d.toISOString().slice(0,10);
}
function tomorrowYMD(){
  const d=new Date();
  d.setDate(d.getDate()+1);
  return d.toISOString().slice(0,10);
}

function getLeads(){return JSON.parse(localStorage.getItem(LEADS_KEY)||"[]")}
function saveLeads(l){localStorage.setItem(LEADS_KEY,JSON.stringify(l))}

function migrate(l){
  if(!l.notes)l.notes="";
  if(!l.followUp)l.followUp="";
  if(!l.status)l.status="NEW";
  return l;
}

function isOverdue(l){
  if(["CLOSED","ARCHIVED"].includes((l.status||"").toUpperCase()))return false;
  return l.followUp && l.followUp<todayYMD();
}

function buildMessage(l){
  const tpl=localStorage.getItem(WA_TEMPLATE_KEY)||"Hello {buyer}, regarding \"{listing}\".";
  return tpl
  .replaceAll("{buyer}",l.buyerName||"")
  .replaceAll("{listing}",l.listingTitle||"property");
}

function autoLog(id,text){
  const leads=getLeads().map(migrate);
  const i=leads.findIndex(x=>x.id===id);
  if(i===-1)return;
  const line=`[${new Date().toLocaleString()}] ${text}`;
  leads[i].notes=leads[i].notes?leads[i].notes+"\n"+line:line;
  leads[i].status="CONTACTED";
  leads[i].lastContactedAt=new Date().toISOString();
  leads[i].updatedAt=new Date().toISOString();
  saveLeads(leads);
}

function openWA(id){
  const leads=getLeads().map(migrate);
  const l=leads.find(x=>x.id===id);
  if(!l||!l.buyerPhone)return alert("No phone");
  const msg=encodeURIComponent(buildMessage(l));
  window.open(`https://wa.me/91${l.buyerPhone}?text=${msg}`,"_blank");
  autoLog(id,"WhatsApp sent");
  toast("WhatsApp opened + logged");
  refresh();
}

async function copyMsg(id){
  const leads=getLeads().map(migrate);
  const l=leads.find(x=>x.id===id);
  if(!l)return;
  const ok=await navigator.clipboard.writeText(buildMessage(l));
  if(ok!==false){
    autoLog(id,"Message copied");
    toast("Copied + logged");
    refresh();
  }
}

function markDone(id){
  const leads=getLeads().map(migrate);
  const i=leads.findIndex(x=>x.id===id);
  if(i===-1)return;
  leads[i].followUp=tomorrowYMD();
  autoLog(id,"Done → moved to tomorrow");
  saveLeads(leads);
  refresh();
}

function snoozeLead(id,days){
  const leads=getLeads().map(migrate);
  const i=leads.findIndex(x=>x.id===id);
  if(i===-1)return;
  const d=new Date();
  d.setDate(d.getDate()+days);
  const newDate=d.toISOString().slice(0,10);
  leads[i].followUp=newDate;
  autoLog(id,`Snoozed +${days} days`);
  saveLeads(leads);
  toast(`Snoozed to ${newDate}`);
  refresh();
}

function markAllDone(){
  const rows=document.querySelectorAll("[data-id]");
  rows.forEach(r=>markDone(r.dataset.id));
  toast("All moved to tomorrow");
}

function refresh(){
  const all=getLeads().map(migrate);
  const q=($("search").value||"").toLowerCase();
  const list=all.filter(l=>{
    const active=!["CLOSED","ARCHIVED"].includes((l.status||"").toUpperCase());
    const scope=(l.followUp===todayYMD()||isOverdue(l));
    const match=[l.buyerName,l.listingTitle,l.buyerPhone,l.notes].join(" ").toLowerCase().includes(q);
    return active&&scope&&match;
  });

  $("count").textContent=list.length;
  $("overdueCount").textContent=list.filter(isOverdue).length;

  const body=$("body");
  if(!list.length){
    body.innerHTML="<tr><td colspan='7' style='opacity:.6'>No follow-ups</td></tr>";
    return;
  }

  body.innerHTML=list.map(l=>{
    return `
<tr class="${isOverdue(l)?"overdueRow":""}" data-id="${l.id}">
<td>${l.followUp||"-"}</td>
<td>${l.listingTitle||"-"}</td>
<td>${l.buyerName||"-"}</td>
<td>${l.buyerPhone||"-"}</td>
<td><span class="pill">${l.status}</span></td>
<td style="max-width:300px;white-space:pre-wrap">${l.notes||"-"}</td>
<td class="row">
<a class="link" href="tel:${l.buyerPhone||""}">Call</a>
<button onclick="openWA('${l.id}')">WA</button>
<button onclick="copyMsg('${l.id}')">Copy</button>
<button class="warn" onclick="markDone('${l.id}')">Done</button>
<button onclick="snoozeLead('${l.id}',2)">+2d</button>
<button onclick="snoozeLead('${l.id}',7)">+7d</button>
</td>
</tr>
`;
  }).join("");
}

document.addEventListener("DOMContentLoaded",refresh);
</script>
</body>
</html>
