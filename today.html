<!doctype html>
<html lang="ta">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MEI — Today Follow-ups</title>
  <style>
    :root{
      --bg:#0b1220;
      --card:#121b2f;
      --line:rgba(255,255,255,.10);
      --txt:#e8eefc;
      --mut:rgba(232,238,252,.75);
      --pill:rgba(255,255,255,.08);
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,Arial;background:var(--bg);color:var(--txt)}
    .wrap{max-width:1150px;margin:0 auto;padding:20px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .h1{font-size:26px;font-weight:900;letter-spacing:.2px}
    .muted{opacity:.75}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    a.link{color:var(--txt);opacity:.9;text-decoration:none;padding:8px 12px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.03)}
    a.link:hover{opacity:1}
    button{
      padding:9px 12px;border-radius:12px;border:1px solid var(--line);
      background:rgba(255,255,255,.06);color:var(--txt);cursor:pointer;font-weight:700
    }
    button:hover{background:rgba(255,255,255,.10)}
    .danger{border-color:rgba(255,0,90,.25);background:rgba(255,0,90,.10)}
    .danger:hover{background:rgba(255,0,90,.16)}
    .ok{border-color:rgba(0,255,150,.25);background:rgba(0,255,150,.10)}
    .ok:hover{background:rgba(0,255,150,.16)}
    .warn{border-color:rgba(255,200,0,.25);background:rgba(255,200,0,.10)}
    .warn:hover{background:rgba(255,200,0,.16)}

    .pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;background:var(--pill);border:1px solid var(--line);opacity:.95}
    .mini{font-size:12px;opacity:.75}
    .title{font-weight:900}
    .nowrap{white-space:nowrap}

    input, select, textarea{
      width:100%;
      padding:10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      background:#0b1220;
      color:var(--txt);
      outline:none;
    }
    textarea{resize:vertical}

    .bar{
      display:grid;
      grid-template-columns: 1.2fr .7fr .7fr .7fr;
      gap:10px;
      margin-top:12px;
    }
    @media (max-width:900px){
      .bar{grid-template-columns:1fr 1fr;}
    }
    @media (max-width:560px){
      .bar{grid-template-columns:1fr;}
    }

    table{width:100%;border-collapse:collapse}
    th,td{padding:10px;vertical-align:top}
    thead th{opacity:.85;text-align:left;border-bottom:1px solid var(--line)}
    tbody tr{border-top:1px solid rgba(255,255,255,.08)}
    .overdueRow{
      background:linear-gradient(90deg, rgba(255,0,90,.10), transparent 45%);
      outline:1px solid rgba(255,0,90,.18);
      outline-offset:-1px;
    }

    .toast{
      display:none;margin-top:10px;padding:10px 12px;border-radius:12px;
      border:1px solid rgba(0,255,150,.22);background:rgba(0,255,150,.10)
    }

    .modalBack{
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.55);
      padding:20px;
    }
    .modalCard{
      max-width:620px; margin:6vh auto;
      background:var(--card);
      border:1px solid rgba(255,255,255,.12);
      border-radius:16px;
      padding:16px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div>
          <div class="h1">MEI — Today Follow-ups</div>
          <div class="muted">Only Today + Overdue leads (execution mode)</div>
        </div>
        <div class="row">
          <a class="link" href="dashboard.html">🏠 Dashboard</a>
          <a class="link" href="buyer.html">👤 Buyer Portal</a>
          <button onclick="refresh()">🔄 Refresh</button>
        </div>
      </div>
      <div id="toast" class="toast">✅ Updated</div>

      <div class="bar">
        <input id="q" placeholder="Search buyer / phone / listing / notes..." oninput="refresh()">
        <select id="scope" onchange="refresh()">
          <option value="TODAY_OVERDUE">Today + Overdue</option>
          <option value="TODAY_ONLY">Today only</option>
          <option value="OVERDUE_ONLY">Overdue only</option>
        </select>
        <select id="status" onchange="refresh()">
          <option value="ACTIVE">Active (not closed/archived)</option>
          <option value="ALL">All</option>
        </select>
        <button class="ok" onclick="markAllDone()">✅ Mark All Done (tomorrow)</button>
      </div>

      <div class="row" style="margin-top:12px;">
        <span class="pill">Showing: <b id="count">0</b></span>
        <span class="pill">Overdue: <b id="odCount">0</b></span>
        <span class="pill">Today: <b id="todayCount">0</b></span>
      </div>
    </div>

    <div class="card" style="margin-top:12px;">
      <div style="overflow:auto;">
        <table style="min-width:1350px;">
          <thead>
            <tr>
              <th class="nowrap">Follow-up</th>
              <th>Listing</th>
              <th>Buyer</th>
              <th class="nowrap">Phone</th>
              <th>Status</th>
              <th>Notes</th>
              <th class="nowrap">Actions</th>
            </tr>
          </thead>
          <tbody id="body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Edit Notes Modal -->
  <div id="modalBack" class="modalBack">
    <div class="modalCard">
      <div class="top">
        <div>
          <div class="h1" style="font-size:18px;">Edit Notes</div>
          <div id="mMeta" class="muted"></div>
        </div>
        <div class="row">
          <button onclick="closeModal()">✕ Close</button>
        </div>
      </div>

      <div style="display:grid; gap:10px; margin-top:12px;">
        <div>
          <label class="mini">Follow-up date</label>
          <input id="mFollow" type="date">
        </div>
        <div>
          <label class="mini">Notes</label>
          <textarea id="mNotes" rows="8"></textarea>
        </div>
        <div class="row">
          <button class="ok" onclick="saveModal()">✅ Save</button>
          <button class="danger" onclick="closeModal()">Cancel</button>
        </div>
      </div>
    </div>
  </div>

<script>
  const LEADS_KEY = "mei_leads_v1";
  const WA_TEMPLATE_KEY = "mei_whatsapp_template_v1";
  let MODAL_ID = null;

  const $ = (id)=>document.getElementById(id);

  function toast(msg="✅ Updated"){
    const el = $("toast");
    el.textContent = msg;
    el.style.display = "block";
    setTimeout(()=> el.style.display="none", 1100);
  }

  function escapeHtml(str){
    return String(str ?? "").replace(/[&<>"']/g, s => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[s]));
  }

  function todayYMD(){
    const d = new Date();
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth()+1).padStart(2,"0");
    const dd = String(d.getDate()).padStart(2,"0");
    return `${yyyy}-${mm}-${dd}`;
  }

  function tomorrowYMD(){
    const d = new Date();
    d.setDate(d.getDate()+1);
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth()+1).padStart(2,"0");
    const dd = String(d.getDate()).padStart(2,"0");
    return `${yyyy}-${mm}-${dd}`;
  }

  function getLeads(){ return JSON.parse(localStorage.getItem(LEADS_KEY) || "[]"); }
  function saveLeads(leads){ localStorage.setItem(LEADS_KEY, JSON.stringify(leads)); }

  function migrate(lead){
    if(lead.notes == null) lead.notes = "";
    if(lead.followUp == null) lead.followUp = "";
    if(lead.lastContactedAt == null) lead.lastContactedAt = "";
    if(lead.updatedAt == null) lead.updatedAt = "";
    if(lead.status == null) lead.status = "NEW";
    return lead;
  }

  function isOverdue(lead){
    const s = (lead.status||"").toUpperCase();
    if(["CLOSED","ARCHIVED"].includes(s)) return false;
    if(!lead.followUp) return false;
    return lead.followUp < todayYMD();
  }

  function isToday(lead){
    const s = (lead.status||"").toUpperCase();
    if(["CLOSED","ARCHIVED"].includes(s)) return false;
    return (lead.followUp || "") === todayYMD();
  }

  function badge(status){
    const s = (status || "NEW").toUpperCase();
    const map = {
      NEW: "background:rgba(0,153,255,.15); border:1px solid rgba(0,153,255,.25);",
      CONTACTED: "background:rgba(255,200,0,.12); border:1px solid rgba(255,200,0,.22);",
      CLOSED: "background:rgba(0,255,150,.12); border:1px solid rgba(0,255,150,.25);",
      ARCHIVED: "background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12);"
    };
    return `<span class="pill" style="${map[s] || map.NEW}">${s}</span>`;
  }

  // Template
  function defaultWATemplate(){
    return `Hello {buyer},

Thanks for your interest in "{listing}".

This is MEI Realty. Please share your preferred time to discuss today.

- MEI`;
  }
  function getWATemplate(){
    return localStorage.getItem(WA_TEMPLATE_KEY) || defaultWATemplate();
  }
  function applyTemplate(tpl, lead){
    const dateStr = new Date().toLocaleDateString();
    return String(tpl || "")
      .replaceAll("{buyer}", lead.buyerName || "")
      .replaceAll("{listing}", lead.listingTitle || "property")
      .replaceAll("{phone}", lead.buyerPhone || "")
      .replaceAll("{date}", dateStr);
  }

  function cleanPhoneForWA(phone){
    const clean = String(phone || "").replace(/[^\d]/g,'');
    if(clean.length === 10) return "91" + clean;
    return clean;
  }

  function buildLeadMessage(l){
    const tpl = getWATemplate();
    return applyTemplate(tpl, {
      buyerName: l.buyerName,
      buyerPhone: l.buyerPhone,
      listingTitle: l.listingTitle
    });
  }

  // Clipboard helper
  async function copyToClipboard(text){
    const t = String(text ?? "");
    if(!t.trim()){
      alert("Nothing to copy");
      return false;
    }
    try{
      if(navigator.clipboard && window.isSecureContext){
        await navigator.clipboard.writeText(t);
        return true;
      }
    }catch(e){}
    try{
      const ta = document.createElement("textarea");
      ta.value = t;
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      ta.style.top = "-9999px";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      const ok = document.execCommand("copy");
      ta.remove();
      return ok;
    }catch(e){
      return false;
    }
  }

  // Auto log
  function autoLog(leadId, type){
    const leads = getLeads().map(migrate);
    const idx = leads.findIndex(x => x.id === leadId);
    if(idx === -1) return;

    const now = new Date();
    const logLine = `[${now.toLocaleString()}] ${type}`;
    const existing = (leads[idx].notes || "").trim();
    leads[idx].notes = existing ? (existing + "\n" + logLine) : logLine;

    // Make sure status + timestamps
    leads[idx].status = "CONTACTED";
    leads[idx].lastContactedAt = now.toISOString();
    leads[idx].updatedAt = now.toISOString();

    // smart default follow-up tomorrow if empty
    if(!leads[idx].followUp){
      leads[idx].followUp = tomorrowYMD();
    }

    saveLeads(leads);
  }

  // Actions
  function openWhatsApp(id){
    const leads = getLeads().map(migrate);
    const l = leads.find(x => x.id === id);
    if(!l || !l.buyerPhone){ alert("No phone number"); return; }

    const msg = buildLeadMessage(l);
    const url = `https://wa.me/${cleanPhoneForWA(l.buyerPhone)}?text=${encodeURIComponent(msg)}`;
    window.open(url, "_blank");

    autoLog(id, "WhatsApp message sent");
    toast("💬 WhatsApp opened + Logged");
    refresh();
  }

  async function copyMsg(id){
    const leads = getLeads().map(migrate);
    const l = leads.find(x => x.id === id);
    if(!l) return;

    const msg = buildLeadMessage(l);
    const ok = await copyToClipboard(msg);
    if(ok){
      autoLog(id, "Message copied");
      toast("📋 Message copied + Logged");
      refresh();
    }else{
      alert("Copy failed.");
    }
  }

  function markDone(id){
    const leads = getLeads().map(migrate);
    const idx = leads.findIndex(x => x.id === id);
    if(idx === -1) return;

    const now = new Date();
    const logLine = `[${now.toLocaleString()}] Follow-up done → moved to tomorrow`;
    const existing = (leads[idx].notes || "").trim();
    leads[idx].notes = existing ? (existing + "\n" + logLine) : logLine;

    leads[idx].status = "CONTACTED";
    leads[idx].lastContactedAt = now.toISOString();
    leads[idx].updatedAt = now.toISOString();
    leads[idx].followUp = tomorrowYMD();

    saveLeads(leads);
    toast("✅ Done → Tomorrow");
    refresh();
  }

  function markAllDone(){
    if(!confirm("Mark all shown leads as done and move follow-up to tomorrow?")) return;

    const shownIds = Array.from(document.querySelectorAll("[data-lead-id]"))
      .map(el => el.getAttribute("data-lead-id"))
      .filter(Boolean);

    if(shownIds.length === 0){
      alert("No leads to mark.");
      return;
    }

    const leads = getLeads().map(migrate);
    const now = new Date();

    shownIds.forEach(id => {
      const idx = leads.findIndex(x => x.id === id);
      if(idx === -1) return;

      const logLine = `[${now.toLocaleString()}] Bulk done → moved to tomorrow`;
      const existing = (leads[idx].notes || "").trim();
      leads[idx].notes = existing ? (existing + "\n" + logLine) : logLine;

      leads[idx].status = "CONTACTED";
      leads[idx].lastContactedAt = now.toISOString();
      leads[idx].updatedAt = now.toISOString();
      leads[idx].followUp = tomorrowYMD();
    });

    saveLeads(leads);
    toast("✅ Bulk done saved");
    refresh();
  }

  // Notes modal
  function openModal(id){
    const leads = getLeads().map(migrate);
    const l = leads.find(x => x.id === id);
    if(!l) return;

    MODAL_ID = id;
    $("mMeta").textContent = `${l.listingTitle || "Listing"} • ${l.buyerName || ""} • ${l.buyerPhone || ""}`;
    $("mFollow").value = l.followUp || "";
    $("mNotes").value = l.notes || "";
    $("modalBack").style.display = "block";
  }

  function closeModal(){
    $("modalBack").style.display = "none";
    MODAL_ID = null;
  }

  function saveModal(){
    if(!MODAL_ID) return;

    const leads = getLeads().map(migrate);
    const idx = leads.findIndex(x => x.id === MODAL_ID);
    if(idx === -1) return;

    leads[idx].followUp = ($("mFollow").value || "").trim();
    leads[idx].notes = ($("mNotes").value || "").trim();
    leads[idx].updatedAt = new Date().toISOString();

    saveLeads(leads);
    toast("✅ Saved");
    closeModal();
    refresh();
  }

  // Filter + render
  function matchesQ(l, q){
    if(!q) return true;
    const hay = [
      l.listingTitle, l.listingId,
      l.buyerName, l.buyerPhone,
      l.message, l.notes
    ].join(" ").toLowerCase();
    return hay.includes(q);
  }

  function refresh(){
    const all = getLeads().map(migrate);
    saveLeads(all);

    const q = ($("q").value || "").trim().toLowerCase();
    const scope = ($("scope").value || "TODAY_OVERDUE");
    const status = ($("status").value || "ACTIVE");

    const tdy = todayYMD();

    const activeFilter = (l)=>{
      if(status === "ALL") return true;
      const s = (l.status||"").toUpperCase();
      return !["CLOSED","ARCHIVED"].includes(s);
    };

    const scopeFilter = (l)=>{
      const fu = l.followUp || "";
      const od = isOverdue(l);
      const isT = fu === tdy;

      if(scope === "TODAY_OVERDUE") return isT || od;
      if(scope === "TODAY_ONLY") return isT;
      if(scope === "OVERDUE_ONLY") return od;
      return true;
    };

    let list = all
      .filter(activeFilter)
      .filter(scopeFilter)
      .filter(l => matchesQ(l, q));

    // sort: overdue first, then earliest follow-up, then newest
    list.sort((a,b)=>{
      const ao = isOverdue(a) ? 0 : 1;
      const bo = isOverdue(b) ? 0 : 1;
      if(ao !== bo) return ao - bo;
      const af = a.followUp || "9999-99-99";
      const bf = b.followUp || "9999-99-99";
      if(af !== bf) return af.localeCompare(bf);
      return String(b.createdAt||"").localeCompare(String(a.createdAt||""));
    });

    const overdueCount = list.filter(isOverdue).length;
    const todayCount = list.filter(isToday).length;

    $("count").textContent = list.length;
    $("odCount").textContent = overdueCount;
    $("todayCount").textContent = todayCount;

    const body = $("body");
    if(list.length === 0){
      body.innerHTML = `<tr><td colspan="7" style="padding:14px; opacity:.75;">No follow-ups for this filter.</td></tr>`;
      return;
    }

    body.innerHTML = list.map(l => {
      const rowClass = isOverdue(l) ? "overdueRow" : "";
      const notesShort = (l.notes||"").trim();
      const notesShow = notesShort ? escapeHtml(notesShort) : "—";
      const fu = l.followUp ? escapeHtml(l.followUp) : "—";

      return `
        <tr class="${rowClass}" data-lead-id="${escapeHtml(l.id)}">
          <td class="nowrap">
            <div class="title">${fu}</div>
            ${isOverdue(l) ? `<div class="mini" style="color:rgba(255,0,90,.95);font-weight:900;">⚠ OVERDUE</div>` : `<div class="mini">Today task</div>`}
          </td>
          <td>
            <div class="title">${escapeHtml(l.listingTitle || "Listing")}</div>
            <div class="mini">ID: ${escapeHtml(l.listingId || "-")}</div>
          </td>
          <td>${escapeHtml(l.buyerName || "-")}</td>
          <td class="nowrap">${escapeHtml(l.buyerPhone || "-")}</td>
          <td>${badge(l.status)}</td>
          <td style="max-width:460px;">${notesShow}</td>
          <td class="nowrap">
            <div class="row">
              <a class="link" style="padding:6px 10px;" href="tel:${encodeURIComponent(l.buyerPhone || "")}">📞 Call</a>
              <button onclick="openWhatsApp('${escapeHtml(l.id)}')">💬 WhatsApp</button>
              <button class="ok" onclick="copyMsg('${escapeHtml(l.id)}')">📋 Copy</button>
              <button onclick="openModal('${escapeHtml(l.id)}')">✏️ Edit</button>
              <button class="warn" onclick="markDone('${escapeHtml(l.id)}')">✅ Done</button>
            </div>
          </td>
        </tr>

        ${(l.message && l.message.trim()) ? `
          <tr class="${rowClass}">
            <td></td>
            <td colspan="6" style="opacity:.88; border-top:1px dashed rgba(255,255,255,.10);">
              📝 ${escapeHtml(l.message)}
            </td>
          </tr>` : ""}
      `;
    }).join("");
  }

  document.addEventListener("DOMContentLoaded", refresh);
</script>
</body>
</html>
