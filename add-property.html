 <!doctype html>
<html lang="ta">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Add Property — MEI</title>
  <link rel="stylesheet" href="add-property.css" />
</head>
<body>
  <main class="wrap">
    <div class="topbar card">
      <div>
        <div class="badge">🏠 MEI Property Intake</div>
        <h1>Add Property</h1>
        <p class="muted">Admin / broker property entry form. Save ஆனதும் approval queue-க்கு போகும்.</p>
      </div>

      <div class="actions">
        <a class="btn" href="dashboard.html">← Back Dashboard</a>
        <a class="btn" href="index.html">Home</a>
      </div>
    </div>

    <div id="toast" class="toast" hidden>
      <span id="toastMsg">Saved</span>
    </div>

    <form id="propertyForm" class="grid" novalidate>
      <section class="card">
        <h2>Basic Details</h2>

        <div class="field">
          <label for="title">Property Title *</label>
          <input id="title" type="text" maxlength="120" placeholder="Eg: 2BHK Apartment Whitefield" required />
        </div>

        <div class="row2">
          <div class="field">
            <label for="type">Property Type *</label>
            <select id="type" required>
              <option value="">Select type</option>
              <option value="Apartment">Apartment</option>
              <option value="House">House</option>
              <option value="Plot">Plot</option>
              <option value="Commercial">Commercial</option>
              <option value="Villa">Villa</option>
            </select>
          </div>

          <div class="field">
            <label for="price">Price (₹) *</label>
            <input id="price" type="number" min="0" placeholder="Eg: 6500000" required />
          </div>
        </div>

        <div class="row2">
          <div class="field">
            <label for="city">City *</label>
            <input id="city" type="text" maxlength="60" placeholder="Eg: Bangalore" required />
          </div>

          <div class="field">
            <label for="area">Area / Locality *</label>
            <input id="area" type="text" maxlength="80" placeholder="Eg: Whitefield" required />
          </div>
        </div>

        <div class="row2">
          <div class="field">
            <label for="beds">Beds</label>
            <input id="beds" type="number" min="0" placeholder="Eg: 2" />
          </div>

          <div class="field">
            <label for="baths">Baths</label>
            <input id="baths" type="number" min="0" placeholder="Eg: 2" />
          </div>
        </div>

        <div class="field">
          <label for="description">Description *</label>
          <textarea id="description" placeholder="Property details, facing, amenities, nearby landmarks..." required></textarea>
        </div>
      </section>

      <section class="card">
        <h2>Seller / Source Info</h2>

        <div class="row2">
          <div class="field">
            <label for="ownerName">Owner / Contact Name *</label>
            <input id="ownerName" type="text" maxlength="80" placeholder="Contact person name" required />
          </div>

          <div class="field">
            <label for="ownerPhone">Phone *</label>
            <input id="ownerPhone" type="tel" maxlength="16" placeholder="10-digit mobile or +91..." required />
          </div>
        </div>

        <div class="row2">
          <div class="field">
            <label for="source">Source</label>
            <select id="source">
              <option value="Admin">Admin</option>
              <option value="Broker">Broker</option>
              <option value="Seller">Seller</option>
              <option value="Builder">Builder</option>
            </select>
          </div>

          <div class="field">
            <label for="featured">Featured</label>
            <select id="featured">
              <option value="false">No</option>
              <option value="true">Yes</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="notes">Internal Notes</label>
          <textarea id="notes" placeholder="Internal admin note..."></textarea>
        </div>

        <div class="checkRow">
          <input id="confirmCheck" type="checkbox" />
          <span>I confirm this property data is ready for approval queue.</span>
        </div>

        <div id="formErr" class="err" hidden></div>

        <div class="submitRow">
          <button class="btn primary" type="submit">💾 Save Property</button>
          <button class="btn" type="button" id="saveDraftBtn">Save Draft</button>
          <button class="btn" type="button" id="clearBtn">Clear</button>
        </div>
      </section>
    </form>
  </main>

  <script src="auth.js"></script>
  <script src="add-property.js"></script>
</body>
</html>
