<!doctype html>
<html lang="ta">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MEI Register</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <div class="authShell">
    <div class="authCard">
      <div class="authBrand">
        <div class="authLogo">MEI</div>
        <div>
          <h1>Create Account</h1>
          <p>Join the MEI platform</p>
        </div>
      </div>

      <form id="registerForm" class="authForm">
        <div>
          <label class="label" for="regName">Full Name</label>
          <input id="regName" type="text" placeholder="Enter full name" required />
        </div>

        <div>
          <label class="label" for="regPhone">Phone</label>
          <input id="regPhone" type="text" placeholder="Enter phone number" required />
        </div>

        <div>
          <label class="label" for="regEmail">Email</label>
          <input id="regEmail" type="email" placeholder="Enter email" required />
        </div>

        <div>
          <label class="label" for="regPassword">Password</label>
          <input id="regPassword" type="password" placeholder="Create password" required />
        </div>

        <div>
          <label class="label" for="regRole">Role</label>
          <select id="regRole" required>
            <option value="">Select role</option>
            <option value="buyer">Buyer</option>
            <option value="seller">Seller</option>
            <option value="broker">Broker</option>
          </select>
        </div>

        <button type="submit" class="btn primary full">✅ Register</button>
      </form>

      <div class="authFooter">
        Already have account?
        <a href="login.html">Login here</a>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
