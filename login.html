<!doctype html>
<html lang="ta">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MEI Login</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <div class="authShell">
    <div class="authCard">
      <div class="authBrand">
        <div class="authLogo">MEI</div>
        <div>
          <h1>Welcome Back</h1>
          <p>Login to access your workspace</p>
        </div>
      </div>

      <form id="loginForm" class="authForm">
        <div>
          <label class="label" for="loginEmail">Email</label>
          <input id="loginEmail" type="email" placeholder="Enter email" required />
        </div>

        <div>
          <label class="label" for="loginPassword">Password</label>
          <input id="loginPassword" type="password" placeholder="Enter password" required />
        </div>

        <button type="submit" class="btn primary full">🔐 Login</button>
      </form>

      <div class="authFooter">
        New here?
        <a href="register.html">Create account</a>
      </div>

      <div class="demoBox">
        <div class="demoTitle">Quick Demo Accounts</div>
        <div class="demoLine">Admin: <b>admin@mei.com</b> / <b>123456</b></div>
        <div class="demoLine">Broker: <b>broker@mei.com</b> / <b>123456</b></div>
        <div class="demoLine">Seller: <b>seller@mei.com</b> / <b>123456</b></div>
        <div class="demoLine">Buyer: <b>buyer@mei.com</b> / <b>123456</b></div>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
